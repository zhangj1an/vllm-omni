# Stage config for Step-Audio2 ASR (speech-to-text only)
#
# Single-stage pipeline: only Thinker, no Token2Wav.
# Use this for audio_to_text tasks where no audio output is needed.

stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0,1"
      max_batch_size: 1
    engine_args:
      model_stage: step_audio2_thinker
      model_arch: StepAudio2ThinkerForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.8
      enforce_eager: true
      trust_remote_code: true
      enable_prefix_caching: false
      max_num_batched_tokens: 2048
      tensor_parallel_size: 2
      engine_output_type: text
    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.7
      top_p: 0.9
      top_k: -1
      max_tokens: 1024
      seed: 42
      detokenize: true
      repetition_penalty: 1.05
