# Stage config for Kimi-Audio-7B-Instruct, Slice 6 (multi-GPU thinker via TP).
#
# Same pipeline as kimi_audio_audio_out.yaml but the fused thinker shards
# across TP ranks (default tensor_parallel_size: 2). Use this when one
# GPU isn't enough memory headroom for the 7B Qwen2 backbone + Whisper
# encoder + the 6-layer MIMO branch + KV cache.
#
# What's sharded vs replicated:
#   - Qwen2 backbone (28 layers, hidden=3584): sharded via vLLM's
#     ColumnParallel/RowParallel linears. Standard vLLM TP path.
#   - Whisper-large-v3 encoder: not sharded — small enough to replicate.
#   - VQ-Adaptor projector: not sharded.
#   - MIMO branch (6 layers, hidden=3584): replicated on every rank. The
#     audio sampling is greedy argmax inside the model so all ranks
#     produce identical token IDs.
#
# Code2wav stays single-GPU — the flow-matching DiTPrefix model is small
# (Slice 4's CUDA Graph is the bigger win there).

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0,1"
    engine_args:
      dtype: bfloat16
      max_num_seqs: 4
      model_stage: fused_thinker
      model_arch: KimiAudioForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      tensor_parallel_size: 2
      distributed_executor_backend: "mp"
      gpu_memory_utilization: 0.85
      enforce_eager: true
      trust_remote_code: true
      tokenizer_mode: kimi_audio
      enable_prefix_caching: false
      engine_output_type: latent
      max_model_len: 8192
      max_num_batched_tokens: 8192
      hf_overrides:
        kimia_generate_audio: true
    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 50
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

  - stage_id: 1
    stage_type: llm
    runtime:
      process: true
      devices: "2"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 4
      model_arch: KimiAudioForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.30
      enforce_eager: true
      trust_remote_code: true
      tokenizer_mode: kimi_audio
      enable_prefix_caching: false
      engine_output_type: audio
      max_model_len: 18192
      max_num_batched_tokens: 18192
      async_scheduling: false
    engine_input_source: [0]
    is_comprehension: false
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.kimi_audio.kimi2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 18192
      seed: 42
      detokenize: false
