# Stage config for Kimi-Audio-7B-Instruct, Slice 3 (async-chunk streaming).
#
# Same two-stage pipeline as kimi_audio_audio_out.yaml, but enables
# async-chunk streaming so the code2wav stage starts emitting audio while
# the thinker is still decoding. Lower TTFB at the cost of slightly higher
# total work (chunk-boundary cross-fade, mel hamming overlap).
#
# Chunk math: codec_chunk_frames=25 + codec_left_context_frames=25 mirrors
# Qwen3-Omni's working values. Kimi's PrefixStreamingFlowMatchingDetokenizer
# is itself a streaming model with internal cross-fade, so the connector
# left-context is mainly to give the flow-matching prefix enough lookback.
# Tune up if you hear seam artefacts; tune down for lower latency.

async_chunk: true
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0"
    engine_args:
      dtype: bfloat16
      max_num_seqs: 4
      model_stage: fused_thinker
      model_arch: KimiAudioForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.85
      enforce_eager: true
      trust_remote_code: true
      tokenizer_mode: kimi_audio
      enable_prefix_caching: false
      engine_output_type: latent
      max_model_len: 8192
      max_num_batched_tokens: 8192
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.kimi_audio.kimi2code2wav_async_chunk
      hf_overrides:
        kimia_generate_audio: true
    is_comprehension: true
    final_output: true
    final_output_type: text
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 50
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

  - stage_id: 1
    stage_type: llm
    runtime:
      process: true
      devices: "1"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 4
      model_arch: KimiAudioForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.30
      enforce_eager: true
      trust_remote_code: true
      tokenizer_mode: kimi_audio
      enable_prefix_caching: false
      engine_output_type: audio
      max_model_len: 18192
      max_num_batched_tokens: 18192
      async_scheduling: false
    engine_input_source: [0]
    is_comprehension: false
    input_connectors:
      from_stage_0: connector_of_shared_memory
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 18192
      seed: 42
      detokenize: false

runtime:
  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        codec_chunk_frames: 25
        codec_left_context_frames: 25
