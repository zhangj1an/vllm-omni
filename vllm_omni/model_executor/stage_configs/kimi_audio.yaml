# Kimi-Audio-7B two-stage pipeline (audio in -> audio out).
# Stage 0: fused thinker (Whisper + VQ-Adaptor + Qwen2 LLM + 6-layer MIMO
#   branch) emits text AND audio tokens.
# Stage 1: code2wav (flow-matching DiT prefix + BigVGAN) -> 24 kHz waveform.
#
# For text-out only (ASR / audio-QA), drop stage 1 and set
# ``hf_overrides.kimia_generate_audio: false`` on stage 0.
# For multi-GPU thinker, set ``tensor_parallel_size: 2`` and
# ``devices: "0,1"`` on stage 0 and move stage 1 to a free GPU.

async_chunk: false
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0"
    engine_args:
      dtype: bfloat16
      max_num_seqs: 4
      model_stage: fused_thinker
      model_arch: KimiAudioForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.55
      enforce_eager: true
      trust_remote_code: true
      tokenizer_mode: kimi_audio
      enable_prefix_caching: false
      engine_output_type: latent
      max_model_len: 8192
      max_num_batched_tokens: 8192
      hf_overrides:
        kimia_generate_audio: true
    is_comprehension: true
    final_output: true
    final_output_type: text
    default_sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 50
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

  - stage_id: 1
    stage_type: llm
    runtime:
      process: true
      devices: "0"
    engine_args:
      model_stage: code2wav
      max_num_seqs: 4
      model_arch: KimiAudioForConditionalGeneration
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.30
      enforce_eager: true
      trust_remote_code: true
      tokenizer_mode: kimi_audio
      enable_prefix_caching: false
      engine_output_type: audio
      max_model_len: 18192
      max_num_batched_tokens: 18192
      async_scheduling: false
    engine_input_source: [0]
    is_comprehension: false
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.kimi_audio.kimi2code2wav
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 18192
      seed: 42
      detokenize: false
