# Kimi-Audio-7B ASR / text-only single-GPU deploy.
#
# Variant of kimi_audio_single_gpu.yaml that disables the MIMO audio
# branch on stage 0 (kimia_generate_audio: false). Stage 1 (code2wav)
# stays defined because the orchestrator pipeline expects two stages,
# but it never receives audio codes — stage 0 emits text only, so
# stage 1's input filter drops everything to empty and decode_mel
# never runs. This avoids tripping the flow-matcher's ~900-token
# KV cache budget that's overwhelmed by the hundreds of audio codes
# kimia_generate_audio=true would produce.
#
# Use this YAML for any task that produces text only. For audio-out
# tasks (qa, multiturn) keep using kimi_audio_single_gpu.yaml.
async_chunk: false
dtype: bfloat16

stages:
  - stage_id: 0
    max_num_seqs: 4
    gpu_memory_utilization: 0.55
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    tokenizer_mode: kimi_audio
    max_model_len: 8192
    max_num_batched_tokens: 8192
    devices: "0"
    hf_overrides:
      kimia_generate_audio: false
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 512
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

  - stage_id: 1
    max_num_seqs: 4
    gpu_memory_utilization: 0.30
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    tokenizer_mode: kimi_audio
    max_model_len: 2048
    max_num_batched_tokens: 2048
    async_scheduling: false
    devices: "0"
    input_processor: kimi2code2wav
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 1
      seed: 42
      detokenize: false
