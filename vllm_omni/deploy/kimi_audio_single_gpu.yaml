# Kimi-Audio-7B single-GPU sync deploy.
#
# Variant of kimi_audio.yaml for hosts with one CUDA device. Both stages
# pin to cuda:0; async_chunk is disabled (the async path requires the
# stages to live on separate GPUs through the SharedMemoryConnector).
# Stage 0 is throttled to 0.55 GPU memory util to leave room for stage 1
# alongside it on the same device.
#
# enforce_eager=true rationale unchanged from the 2-GPU YAML — see
# kimi_audio.yaml for the full notes.
async_chunk: false
dtype: bfloat16

stages:
  - stage_id: 0
    max_num_seqs: 4
    gpu_memory_utilization: 0.55
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    tokenizer_mode: kimi_audio
    max_model_len: 8192
    max_num_batched_tokens: 8192
    devices: "0"
    hf_overrides:
      kimia_generate_audio: true
    default_sampling_params:
      temperature: 0.6
      top_p: 0.95
      top_k: 50
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.0

  - stage_id: 1
    max_num_seqs: 4
    gpu_memory_utilization: 0.30
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    tokenizer_mode: kimi_audio
    # max_model_len capped to keep vLLM's profile_run within the
    # FM detokenizer's 900-token KV-cache budget. 18192 (the original
    # async-chunk YAML's value) makes profile_run feed 18k dummy codes
    # through the chunked detokenize loop and overflow
    # ``reserve_kv_cache_tokens`` past ``max_kv_cache_tokens``.
    max_model_len: 2048
    max_num_batched_tokens: 2048
    async_scheduling: false
    devices: "0"
    input_processor: kimi2code2wav
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 2048
      seed: 42
      detokenize: false
